openapi: 3.0.3
info:
  title: Swiss Zefix Company Register API
  description: |
    Search Swiss companies in the official Zefix commercial register (UID register).
    Returns UID, legal form, address, purpose, and SHAB (Official Gazette) publications.
    Wraps the official Zefix REST API with caching and simplified access.

    **Use cases:** Swiss KYB, DACH compliance, M&A due diligence, Swiss business directories,
    cross-border KYC for companies operating in Switzerland.
  version: "1.0.0"
  contact:
    email: louismaximilianmeyer@gmail.com
servers:
  - url: https://api.yourdomain.com
security:
  - apiKey: []
  - rapidApiKey: []
paths:
  /v1/ch/company/search:
    get:
      summary: Search companies by name
      operationId: searchZefix
      tags: [Swiss Companies]
      parameters:
        - name: name
          in: query
          required: true
          schema: { type: string, example: "Nestlé" }
        - name: lang
          in: query
          schema: { type: string, enum: [DE, FR, IT, EN], default: DE }
        - name: activeOnly
          in: query
          schema: { type: boolean, default: true }
        - name: maxResults
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Company search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  results:
                    type: array
                    items: { $ref: "#/components/schemas/Company" }
        "400": { description: Missing name parameter }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /v1/ch/company/{uid}:
    get:
      summary: Get company by UID
      operationId: getZefixByUID
      tags: [Swiss Companies]
      parameters:
        - name: uid
          in: path
          required: true
          schema: { type: string, example: "CHE-116.281.710" }
          description: Swiss UID (Unternehmens-Identifikationsnummer), format CHE-XXX.XXX.XXX
      responses:
        "200":
          description: Company record
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Company" }
        "404": { description: Company not found }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/ch/company/{uid}/publications:
    get:
      summary: Get SHAB publications for a company
      operationId: getZefixPublications
      tags: [Swiss Companies]
      parameters:
        - name: uid
          in: path
          required: true
          schema: { type: string, example: "CHE-116.281.710" }
      responses:
        "200":
          description: SHAB official publications
          content:
            application/json:
              schema:
                type: object
                properties:
                  uid: { type: string }
                  publications:
                    type: array
                    items: { $ref: "#/components/schemas/Publication" }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    apiKey: { type: apiKey, in: header, name: X-API-Key }
    rapidApiKey: { type: apiKey, in: header, name: X-RapidAPI-Proxy-Secret }
  schemas:
    Company:
      type: object
      properties:
        uid: { type: string, example: "CHE-116.281.710" }
        name: { type: string, example: "Nestlé S.A." }
        legalForm: { type: string, example: "Aktiengesellschaft" }
        status: { type: string, enum: [ACTIVE, CANCELLED, DELETED] }
        canton: { type: string, example: "VD" }
        municipality: { type: string, example: "Vevey" }
        address:
          type: object
          properties:
            street: { type: string }
            postalCode: { type: string }
            city: { type: string }
        purposeDE: { type: string }
        registeredAt: { type: string, format: date }
    Publication:
      type: object
      properties:
        shabId: { type: string }
        publicationDate: { type: string, format: date }
        rubric: { type: string }
        subRubric: { type: string }
        text: { type: string }
  responses:
    Unauthorized:
      description: Invalid API key
      content:
        application/json:
          schema: { type: object, properties: { error: { type: string } } }
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { type: object, properties: { error: { type: string } } }
