# ══════════════════════════════════════════════════════════════════════════════
#  Nginx — all APIs + dashboard + legal pages
#  Run ./setup-ssl.sh api.yourdomain.com your@email.com to configure HTTPS
#
#  Resilience: passive health checks on every upstream.
#  max_fails=3 fail_timeout=30s  → after 3 errors in 30s nginx marks the
#  backend as unavailable for 30s, then probes again automatically.
#  proxy_next_upstream (see server block) routes around 502/504 errors.
# ══════════════════════════════════════════════════════════════════════════════

# ── Upstream definitions with passive health checking ─────────────────────────
upstream insolvency { server 127.0.0.1:8080 max_fails=3 fail_timeout=30s; }
upstream zvg        { server 127.0.0.1:8081 max_fails=3 fail_timeout=30s; }
upstream ted        { server 127.0.0.1:8082 max_fails=3 fail_timeout=30s; }
upstream dpma       { server 127.0.0.1:8083 max_fails=3 fail_timeout=30s; }
upstream sanctions  { server 127.0.0.1:8084 max_fails=3 fail_timeout=30s; }
upstream safety     { server 127.0.0.1:8085 max_fails=3 fail_timeout=30s; }
upstream zefix      { server 127.0.0.1:8086 max_fails=3 fail_timeout=30s; }
upstream bafin      { server 127.0.0.1:8087 max_fails=3 fail_timeout=30s; }
upstream dashboard  { server 127.0.0.1:8088 max_fails=3 fail_timeout=30s; }
upstream gleif      { server 127.0.0.1:8089 max_fails=3 fail_timeout=30s; }
upstream cordis     { server 127.0.0.1:8090 max_fails=3 fail_timeout=30s; }
upstream monitor    { server 127.0.0.1:8091 max_fails=3 fail_timeout=30s; }
upstream handelsreg { server 127.0.0.1:8092 max_fails=3 fail_timeout=30s; }
upstream euipo      { server 127.0.0.1:8093 max_fails=3 fail_timeout=30s; }
upstream frcompany  { server 127.0.0.1:8094 max_fails=3 fail_timeout=30s; }
upstream ukcompany  { server 127.0.0.1:8095 max_fails=3 fail_timeout=30s; }
upstream research   { server 127.0.0.1:8096 max_fails=3 fail_timeout=30s; }
upstream gdpr       { server 127.0.0.1:8097 max_fails=3 fail_timeout=30s; }
upstream secedgar   { server 127.0.0.1:8098 max_fails=3 fail_timeout=30s; }
upstream food       { server 127.0.0.1:8099 max_fails=3 fail_timeout=30s; }
upstream aviation   { server 127.0.0.1:8100 max_fails=3 fail_timeout=30s; }
upstream weather    { server 127.0.0.1:8101 max_fails=3 fail_timeout=30s; }
upstream currency   { server 127.0.0.1:8102 max_fails=3 fail_timeout=30s; }
upstream openfda    { server 127.0.0.1:8103 max_fails=3 fail_timeout=30s; }
upstream wikidata   { server 127.0.0.1:8104 max_fails=3 fail_timeout=30s; }
upstream crypto     { server 127.0.0.1:8105 max_fails=3 fail_timeout=30s; }
upstream ipgeo      { server 127.0.0.1:8107 max_fails=3 fail_timeout=30s; }
upstream vat        { server 127.0.0.1:8108 max_fails=3 fail_timeout=30s; }
upstream countries  { server 127.0.0.1:8109 max_fails=3 fail_timeout=30s; }
upstream pubchem    { server 127.0.0.1:8110 max_fails=3 fail_timeout=30s; }
upstream nasa       { server 127.0.0.1:8111 max_fails=3 fail_timeout=30s; }
upstream airquality { server 127.0.0.1:8113 max_fails=3 fail_timeout=30s; }
upstream fxrates    { server 127.0.0.1:8114 max_fails=3 fail_timeout=30s; }
upstream gbif       { server 127.0.0.1:8115 max_fails=3 fail_timeout=30s; }
upstream namepredict { server 127.0.0.1:8119 max_fails=3 fail_timeout=30s; }
upstream worldbank  { server 127.0.0.1:8120 max_fails=3 fail_timeout=30s; }
upstream trials     { server 127.0.0.1:8121 max_fails=3 fail_timeout=30s; }
upstream gateway    { server 127.0.0.1:8000 max_fails=3 fail_timeout=30s; }

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;   # ← change to your domain

    # SSL (managed by Certbot — run ./setup-ssl.sh first)
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Scraping APIs can take up to 60s
    proxy_read_timeout    70s;
    proxy_send_timeout    70s;
    proxy_connect_timeout 5s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Resilience: retry on upstream error/timeout ───────────────────────────
    # If the upstream returns 502/503/504 or times out, nginx tries the next
    # available server in the upstream pool automatically.
    proxy_next_upstream          error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries    2;
    proxy_next_upstream_timeout  10s;

    # Return a clean JSON error if all upstreams fail
    error_page 502 503 504 @upstream_error;
    location @upstream_error {
        default_type application/json;
        return 503 '{"error":"service_unavailable","message":"This API is temporarily unavailable. Please retry in a moment."}';
    }

    # ── Legal pages (static HTML, no auth) ───────────────────────────────────
    location = /impressum {
        root /var/www/static;
        try_files /impressum.html =404;
        add_header Content-Type text/html;
    }
    location = /datenschutz {
        root /var/www/static;
        try_files /privacy.html =404;
        add_header Content-Type text/html;
    }
    location = /privacy { return 301 /datenschutz; }

    # ── Dashboard (password protected by app itself) ──────────────────────────
    location /dashboard/ {
        proxy_pass http://dashboard/;
        # Sticky session for login cookie
        proxy_set_header Cookie $http_cookie;
    }

    # ── API endpoints ─────────────────────────────────────────────────────────
    location /v1/insolvency/ { proxy_pass http://insolvency; }
    location /v1/zvg/        { proxy_pass http://zvg; }
    location /v1/ted/        { proxy_pass http://ted; }
    location /v1/trademark/  { proxy_pass http://dpma; }
    location /v1/sanctions/  { proxy_pass http://sanctions; }
    location /v1/recalls/    { proxy_pass http://safety; }
    location /v1/ch/         { proxy_pass http://zefix; }
    location /v1/bafin/      { proxy_pass http://bafin; }
    location /v1/lei/        { proxy_pass http://gleif; }
    location /v1/grants/     { proxy_pass http://cordis; }
    # Monitor — restrict to your IP or keep internal only
    location /monitor/          { proxy_pass http://monitor/; }
    location /v1/handelsregister/ { proxy_pass http://handelsreg; }
    location /v1/eu-trademark/   { proxy_pass http://euipo; }
    location /v1/fr/             { proxy_pass http://frcompany; }
    location /v1/uk/             { proxy_pass http://ukcompany; }
    location /v1/research/       { proxy_pass http://research; }
    location /v1/gdpr/           { proxy_pass http://gdpr; }
    location /v1/sec/            { proxy_pass http://secedgar; }
    location /v1/food/           { proxy_pass http://food; }
    location /v1/aviation/       { proxy_pass http://aviation; }
    location /v1/weather/        { proxy_pass http://weather; }
    location /v1/currency/       { proxy_pass http://currency; }
    location /v1/drug/           { proxy_pass http://openfda; }
    location /v1/wikidata/       { proxy_pass http://wikidata; }
    location /v1/crypto/         { proxy_pass http://crypto; }
    location /v1/ipgeo/          { proxy_pass http://ipgeo; }
    location /v1/vat/            { proxy_pass http://vat; }
    location /v1/countries/      { proxy_pass http://countries; }
    location /v1/chem/           { proxy_pass http://pubchem; }
    location /v1/nasa/           { proxy_pass http://nasa; }
    location /v1/air/            { proxy_pass http://airquality; }
    location /v1/fx/             { proxy_pass http://fxrates; }
    location /v1/bio/            { proxy_pass http://gbif; }
    location /v1/name/           { proxy_pass http://namepredict; }
    location /v1/worldbank/      { proxy_pass http://worldbank; }
    location /v1/trials/         { proxy_pass http://trials; }

    # ── MCP (Model Context Protocol) — per-API endpoints for AI tools ────────
    # Each path routes to the correct API's /mcp handler
    location = /mcp/trademark  { proxy_pass http://dpma/mcp; }
    location = /mcp/sanctions  { proxy_pass http://sanctions/mcp; }
    location = /mcp/lei        { proxy_pass http://gleif/mcp; }
    location = /mcp/eu-trademark { proxy_pass http://euipo/mcp; }
    location = /mcp/fr-company   { proxy_pass http://frcompany/mcp; }
    location = /mcp/uk-company   { proxy_pass http://ukcompany/mcp; }
    location = /mcp/research     { proxy_pass http://research/mcp; }
    location = /mcp/gdpr         { proxy_pass http://gdpr/mcp; }
    location = /mcp/sec          { proxy_pass http://secedgar/mcp; }
    location = /mcp/food         { proxy_pass http://food/mcp; }
    location = /mcp/aviation     { proxy_pass http://aviation/mcp; }
    location = /mcp/weather      { proxy_pass http://weather/mcp; }
    location = /mcp/currency     { proxy_pass http://currency/mcp; }
    location = /mcp/drug         { proxy_pass http://openfda/mcp; }
    location = /mcp/wikidata     { proxy_pass http://wikidata/mcp; }
    location = /mcp/crypto       { proxy_pass http://crypto/mcp; }
    location = /mcp/ipgeo        { proxy_pass http://ipgeo/mcp; }
    location = /mcp/vat          { proxy_pass http://vat/mcp; }
    location = /mcp/countries    { proxy_pass http://countries/mcp; }
    location = /mcp/chem         { proxy_pass http://pubchem/mcp; }
    location = /mcp/nasa         { proxy_pass http://nasa/mcp; }
    location = /mcp/air          { proxy_pass http://airquality/mcp; }
    location = /mcp/fx           { proxy_pass http://fxrates/mcp; }
    location = /mcp/bio          { proxy_pass http://gbif/mcp; }
    location = /mcp/name         { proxy_pass http://namepredict/mcp; }
    location = /mcp/worldbank    { proxy_pass http://worldbank/mcp; }
    location = /mcp/trials       { proxy_pass http://trials/mcp; }

    # ── Health checks (public) ───────────────────────────────────────────────
    location = /health/insolvency { proxy_pass http://insolvency/health; }
    location = /health/zvg        { proxy_pass http://zvg/health; }
    location = /health/ted        { proxy_pass http://ted/health; }
    location = /health/trademark  { proxy_pass http://dpma/health; }
    location = /health/sanctions  { proxy_pass http://sanctions/health; }
    location = /health/recalls    { proxy_pass http://safety/health; }
    location = /health/ch         { proxy_pass http://zefix/health; }
    location = /health/bafin      { proxy_pass http://bafin/health; }
    location = /health/lei          { proxy_pass http://gleif/health; }
    location = /health/grants       { proxy_pass http://cordis/health; }
    location = /health/handelsreg   { proxy_pass http://handelsreg/health; }
    location = /health/eu-trademark { proxy_pass http://euipo/health; }
    location = /health/fr-company   { proxy_pass http://frcompany/health; }
    location = /health/uk-company   { proxy_pass http://ukcompany/health; }
    location = /health/research     { proxy_pass http://research/health; }
    location = /health/gdpr         { proxy_pass http://gdpr/health; }
    location = /health/sec          { proxy_pass http://secedgar/health; }
    location = /health/food         { proxy_pass http://food/health; }
    location = /health/aviation     { proxy_pass http://aviation/health; }
    location = /health/weather      { proxy_pass http://weather/health; }
    location = /health/currency     { proxy_pass http://currency/health; }
    location = /health/drug         { proxy_pass http://openfda/health; }
    location = /health/wikidata     { proxy_pass http://wikidata/health; }
    location = /health/crypto       { proxy_pass http://crypto/health; }
    location = /health/ipgeo        { proxy_pass http://ipgeo/health; }
    location = /health/vat          { proxy_pass http://vat/health; }
    location = /health/countries    { proxy_pass http://countries/health; }
    location = /health/chem         { proxy_pass http://pubchem/health; }
    location = /health/nasa         { proxy_pass http://nasa/health; }
    location = /health/air          { proxy_pass http://airquality/health; }
    location = /health/fx           { proxy_pass http://fxrates/health; }
    location = /health/bio          { proxy_pass http://gbif/health; }
    location = /health/name         { proxy_pass http://namepredict/health; }
    location = /health/worldbank    { proxy_pass http://worldbank/health; }
    location = /health/trials       { proxy_pass http://trials/health; }
    location = /health/gateway      { proxy_pass http://gateway/health; }

    # ── Gateway management ────────────────────────────────────────────────────
    location /gateway/              { proxy_pass http://gateway; }

    # ── MCP Well-Known (domain verification for official MCP registry) ────────
    # Used by: modelcontextprotocol.io/registry domain auth
    # After running: mcp-publisher login http --domain DOMAIN
    # Place the generated file at: /srv/apis/deploy/well-known/mcp-registry-auth
    location /.well-known/ {
        alias /srv/apis/deploy/well-known/;
        add_header Content-Type text/plain;
        add_header Access-Control-Allow-Origin *;
    }

    # ── Root: API index ───────────────────────────────────────────────────────
    location = / {
        default_type application/json;
        return 200 '{"service":"API Suite","version":"1.0","apis":["/v1/insolvency","/v1/zvg","/v1/ted","/v1/trademark","/v1/eu-trademark","/v1/sanctions","/v1/recalls","/v1/ch","/v1/bafin","/v1/lei","/v1/grants","/v1/handelsregister"],"legal":["/impressum","/datenschutz"],"dashboard":"/dashboard/"}';
    }
}
