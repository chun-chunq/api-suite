# ══════════════════════════════════════════════════════════════════════════════
#  MASTER docker-compose — all APIs on one Hetzner VPS
#  Ports:
#    8080  insolvency-api   (German insolvency register scraper)
#    8081  zvg-api          (German foreclosure auctions scraper)
#    8082  ted-api          (EU TED procurement — REST wrapper, no Chrome)
#    8083  dpma-api         (German trademark register scraper)
#    8084  sanctions-api    (EU consolidated sanctions list — pure Go, no Chrome)
#
#  Set secrets in .env (copy from .env.template, never commit .env)
#  Start:  docker compose up -d
#  Stop:   docker compose down
#  Logs:   docker compose logs -f [service]
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── 1. Insolvency API ────────────────────────────────────────────────────────
  insolvency-api:
    build:
      context: ../insolvency-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REDIS_ADDR: "insolvency-redis:6379"
      API_KEYS: "${API_KEYS}"
      RATE_LIMIT_MAX: "60"
      RATE_LIMIT_WINDOW: "1h"
      SEARCH_CACHE_TTL: "1h"
      RECORD_CACHE_TTL: "24h"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CHROME_BIN: "/usr/bin/chromium"
      MAX_BROWSERS: "${MAX_BROWSERS:-2}"
      MAX_QUEUE_DEPTH: "${MAX_QUEUE_DEPTH:-20}"
      ADMIN_SECRET: "${ADMIN_SECRET}"
      BANDWIDTH_LIMIT_GB: "${BANDWIDTH_LIMIT_GB:-15}"
      WORKER_SECRET: "${WORKER_SECRET}"
      WORKER_URLS: "${INSOLVENCY_WORKER_URLS:-}"
      GOGC: "50"
      GOMEMLIMIT: "256MiB"
    depends_on:
      insolvency-redis:
        condition: service_healthy
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    mem_limit: 512m
    mem_reservation: 128m

  insolvency-redis:
    image: redis:7-alpine
    command: >
      redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - insolvency-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 80m

  # ── 2. ZVG API ───────────────────────────────────────────────────────────────
  browserless:
    image: browserless/chrome:latest
    environment:
      MAX_CONCURRENT_SESSIONS: "3"
      MAX_QUEUE_LENGTH: "10"
      TOKEN: "${BROWSERLESS_TOKEN:-insecure-default}"
      EXIT_ON_HEALTH_FAILURE: "true"
      PREBOOT_CHROME: "true"
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 256m

  zvg-api:
    build:
      context: ../zvg-api
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      REDIS_ADDR: "zvg-redis:6379"
      API_KEYS: "${API_KEYS}"
      RATE_LIMIT_MAX: "60"
      RATE_LIMIT_WINDOW: "1h"
      CACHE_TTL: "1h"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      BROWSERLESS_URL: "ws://browserless:3000"
      BROWSERLESS_TOKEN: "${BROWSERLESS_TOKEN:-insecure-default}"
      MAX_BROWSERS: "${MAX_BROWSERS:-2}"
      MAX_QUEUE_DEPTH: "${MAX_QUEUE_DEPTH:-20}"
      ADMIN_SECRET: "${ADMIN_SECRET}"
      BANDWIDTH_LIMIT_GB: "${BANDWIDTH_LIMIT_GB:-15}"
      WORKER_SECRET: "${WORKER_SECRET}"
      WORKER_URLS: "${ZVG_WORKER_URLS:-}"
      GOGC: "50"
      GOMEMLIMIT: "128MiB"
    depends_on:
      - browserless
      - zvg-redis
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m

  zvg-redis:
    image: redis:7-alpine
    command: >
      redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - zvg-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 80m

  # ── 3. TED EU Procurement API ─────────────────────────────────────────────────
  ted-api:
    build:
      context: ../ted-api
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      REDIS_ADDR: "ted-redis:6379"
      API_KEYS: "${API_KEYS}"
      RATE_LIMIT_MAX: "100"
      RATE_LIMIT_WINDOW: "1h"
      CACHE_TTL: "6h"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      ADMIN_SECRET: "${ADMIN_SECRET}"
      TED_API_KEY: "${TED_API_KEY:-}"
      GOGC: "20"
      GOMEMLIMIT: "128MiB"
    depends_on:
      ted-redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m

  ted-redis:
    image: redis:7-alpine
    command: >
      redis-server --appendonly yes --maxmemory 32mb --maxmemory-policy allkeys-lru
    volumes:
      - ted-redis-data:/data
