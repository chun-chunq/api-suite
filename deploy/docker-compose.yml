  # ── 12. Health Monitor + Alerter ─────────────────────────────────────────────
  monitor:
    build:
      context: ../monitor
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    environment:
      PORT: "8091"
      CHECK_INTERVAL_SEC: "${CHECK_INTERVAL_SEC:-300}"   # check every 5 minutes
      # ── Telegram (primary — set up in 2 min, see ALERTING.md) ──
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID:   "${TELEGRAM_CHAT_ID:-}"
      # ── Discord webhook (optional) ──
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      # ── Email / SMTP (optional) ──
      SMTP_HOST:      "${SMTP_HOST:-}"
      SMTP_PORT:      "${SMTP_PORT:-587}"
      SMTP_USER:      "${SMTP_USER:-}"
      SMTP_PASSWORD:  "${SMTP_PASSWORD:-}"
      ALERT_EMAIL_TO: "${ALERT_EMAIL_TO:-}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    # Must reach other services on localhost
    network_mode: host
    restart: unless-stopped
    mem_limit: 64m

  # ── 14. Handelsregister API (German Commercial Register) ─────────────────────
