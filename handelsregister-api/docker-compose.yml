services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      args:
        VERSION: ${VERSION:-local}
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      PORT: "8080"
      REDIS_ADDR: redis:6379
      REDIS_DB: "0"
      CACHE_TTL: 24h
      RATE_LIMIT_PER_MINUTE: "60"
      SCRAPE_TIMEOUT: 45s
      WORKER_CONCURRENCY: "5"
      BROWSER_BIN: /usr/bin/chromium
      # Comma-separated list of valid customer API keys.
      API_KEYS: ${API_KEYS:-dev-key-123}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Chromium needs extra shared memory to avoid crashes under load.
    shm_size: "1gb"

  # Optional: asynqmon dashboard for inspecting the job queue.
  asynqmon:
    image: hibiken/asynqmon:latest
    command: ["--redis-addr=redis:6379"]
    ports:
      - "8081:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
