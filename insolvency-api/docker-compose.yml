services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REDIS_ADDR: "redis:6379"
      API_KEYS: "demo-key-12345"
      RATE_LIMIT_MAX: "60"
      RATE_LIMIT_WINDOW: "1h"
      SEARCH_CACHE_TTL: "1h"
      RECORD_CACHE_TTL: "24h"
      LOG_LEVEL: "info"
      ENVIRONMENT: "production"
      CHROME_BIN: "/usr/bin/chromium"
      GOGC: "50"
      GOMEMLIMIT: "256MiB"
      MAX_BROWSERS: "2"
      MAX_QUEUE_DEPTH: "20"
      ADMIN_SECRET: "admin-secret-aendere-mich"
      BANDWIDTH_LIMIT_GB: "15"
      # Add remote worker URLs here (comma-separated) to enable IP rotation.
      # Workers can be: other Hetzner IPs, home PC via Tailscale, spare VPS.
      # Example: WORKER_URLS=http://worker2:9090,http://100.x.x.x:9090
      WORKER_URLS: ""
      # Secret shared with the home-PC worker (pc-worker.exe).
      # Set the same value in config.yaml on the home PC.
      WORKER_SECRET: "aendere-mich-geheim-123"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    mem_limit: 512m
    mem_reservation: 128m

  # Optional: run a second worker on the same host (different container, same IP).
  # In production: replace with a worker on a different server/IP.
  # worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.worker
  #   ports:
  #     - "9090:9090"
  #   environment:
  #     WORKER_PORT: "9090"
  #     CHROME_BIN: "/usr/bin/chromium"
  #   restart: unless-stopped
  #   cap_add:
  #     - SYS_ADMIN

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    mem_limit: 80m
    command: >
      redis-server
      --appendonly yes
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru

volumes:
  redis-data:


